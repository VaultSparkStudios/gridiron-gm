<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3d"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titlegrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Field yard lines (subtle) -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Gold accent bars -->
  <rect width="1200" height="6" fill="#f59e0b"/>
  <rect y="624" width="1200" height="6" fill="#f59e0b"/>

  <!-- Left glow panel -->
  <rect width="500" height="630" fill="url(#glow)"/>

  <!-- Main title -->
  <text x="80" y="210" font-family="'Arial Black',Arial,sans-serif" font-size="52" font-weight="900" fill="#f59e0b" letter-spacing="12" text-transform="uppercase">GRIDIRON</text>
  <text x="80" y="340" font-family="'Arial Black',Arial,sans-serif" font-size="180" font-weight="900" fill="url(#titlegrad)" letter-spacing="-4">GM</text>

  <!-- Tagline -->
  <text x="80" y="405" font-family="Arial,sans-serif" font-size="26" fill="#475569" letter-spacing="6">MANAGE  ✦  PLAY  ✦  WIN</text>

  <!-- Feature pills -->
  <g font-family="Arial,sans-serif" font-size="18" font-weight="700">
    <rect x="80" y="450" width="160" height="36" rx="18" fill="#1e3a5f"/>
    <text x="160" y="473" text-anchor="middle" fill="#7dd3fc">📋 DRAFT</text>

    <rect x="254" y="450" width="160" height="36" rx="18" fill="#14532d"/>
    <text x="334" y="473" text-anchor="middle" fill="#86efac">💰 TRADES</text>

    <rect x="428" y="450" width="180" height="36" rx="18" fill="#3b0764"/>
    <text x="518" y="473" text-anchor="middle" fill="#c4b5fd">⚡ LIVE SIM</text>

    <rect x="80" y="498" width="200" height="36" rx="18" fill="#451a03"/>
    <text x="180" y="521" text-anchor="middle" fill="#fcd34d">🏆 DYNASTY MODE</text>

    <rect x="294" y="498" width="200" height="36" rx="18" fill="#1e293b"/>
    <text x="394" y="521" text-anchor="middle" fill="#94a3b8">🔍 SCOUTING</text>
  </g>

  <!-- Football illustration (right side) -->
  <g transform="translate(830, 280)">
    <ellipse cx="0" cy="0" rx="200" ry="120" fill="#c2813a" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="200" ry="120" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6"/>
    <!-- Seam -->
    <path d="M-200,0 Q0,-80 200,0" fill="none" stroke="#8b5a2b" stroke-width="3"/>
    <path d="M-200,0 Q0,80 200,0" fill="none" stroke="#8b5a2b" stroke-width="3"/>
    <!-- Laces -->
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#ffffff" stroke-width="5"/>
    <line x1="-28" y1="-35" x2="28" y2="-35" stroke="#ffffff" stroke-width="4"/>
    <line x1="-28" y1="-15" x2="28" y2="-15" stroke="#ffffff" stroke-width="4"/>
    <line x1="-28" y1="5" x2="28" y2="5" stroke="#ffffff" stroke-width="4"/>
    <line x1="-28" y1="25" x2="28" y2="25" stroke="#ffffff" stroke-width="4"/>
  </g>

  <!-- Branding -->
  <text x="80" y="590" font-family="Arial,sans-serif" font-size="18" fill="#1e3a5f" letter-spacing="2">VAULTSPARK STUDIOS  ·  FREE TO PLAY  ·  NO DOWNLOAD</text>
</svg>
